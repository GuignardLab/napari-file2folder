name: napari-file2folder
display_name: Save multidimensional file as folder of tifs
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/manifest.html for valid categories
categories: ["Annotation", "Segmentation", "Acquisition"]
contributions:
  commands:
    - id: napari-file2folder.get_reader
      python_name: napari_file2folder:get_reader
      title: Read bioimages with bioio
    - id: napari-file2folder.make_qwidget
      python_name: napari_file2folder:File2FolderWidget
      title: Explore large images and save as folder of tifs
  readers:
    - command: napari-file2folder.get_reader
      accepts_directories: true
      filename_patterns:
        - "*.nd2"
        - "*.czi"
        - "*.zarr"
        - "*.ome.zarr"
  widgets:
    - command: napari-file2folder.make_qwidget
      display_name: Explore large images and save as folder of tifs
